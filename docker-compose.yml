services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      # Bound to localhost only — DB must not be reachable from outside the host
      - '127.0.0.1:5433:5432'
    environment:
      POSTGRES_USER: school
      POSTGRES_PASSWORD: school
      POSTGRES_DB: school_gradebook
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U school -d school_gradebook']
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
          pids: 200

  minio:
    # Pin to a specific release — update deliberately, not on every pull
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    restart: unless-stopped
    ports:
      # Both ports bound to localhost only — admin console must not be internet-reachable
      - '127.0.0.1:9002:9000'
      - '127.0.0.1:9003:9001'
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
          pids: 200

volumes:
  postgres_data:
  minio_data:
